<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0b0d">
  <title>Michigan Data Center Tracker | Live Map</title>
  <meta name="description" content="Interactive map of Michigan data center proposals, moratoria, utility pauses and public-source project records.">
  <link rel="canonical" href="https://midatacentertracker.github.io/mi-data-center-tracker/map.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Michigan Data Center Tracker — Live Map">
  <meta property="og:description" content="Interactive map of Michigan data center proposals, moratoria, utility pauses and public-source project records.">
  <meta property="og:url" content="https://midatacentertracker.github.io/mi-data-center-tracker/map.html">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #cf102d;
      --red-dark: #a30b22;
      --bg: #0b0b0d;
      --ink: #f2f3f6;
      --ink-dim: #b4b9c8;
      --ink-muted: #7a8194;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --panel: rgba(11,11,13,0.88);
      --display: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .skip-link {
      position: fixed;
      top: -100px;
      left: 16px;
      z-index: 2000;
      background: var(--red);
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
    }
    .skip-link:focus { top: 12px; }

    .map-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      background: #10131a;
      cursor: grab;
    }
    #map.leaflet-dragging { cursor: grabbing; }
    .leaflet-container { background: #10131a; outline: none; font-family: var(--sans); }
    .leaflet-control-attribution {
      background: rgba(11,11,13,0.75) !important;
      color: var(--ink-muted) !important;
      font-size: 10px !important;
      border-radius: 6px 0 0 0 !important;
      padding: 2px 6px !important;
    }
    .leaflet-control-attribution a { color: var(--ink-dim) !important; }

    .map-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 401;
      background:
        radial-gradient(ellipse at center, transparent 42%, rgba(11,11,13,0.28) 100%),
        linear-gradient(180deg, rgba(11,11,13,0.42) 0%, transparent 12%, transparent 88%, rgba(11,11,13,0.35) 100%);
    }
    .map-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 402;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .map-stats-ribbon {
      position: absolute;
      z-index: 660;
      top: 74px;
      right: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: min(520px, calc(100vw - 400px));
      pointer-events: none;
    }
    .stat-pill {
      pointer-events: auto;
      background: rgba(11,11,13,0.9);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 8px 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }
    .stat-pill strong {
      display: block;
      font-family: var(--display);
      font-size: 1.15rem;
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
    .stat-pill span {
      display: block;
      margin-top: 3px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .stat-pill--accent {
      border-color: rgba(207,16,45,0.45);
      background: linear-gradient(135deg, rgba(207,16,45,0.18), rgba(11,11,13,0.92));
    }

    .map-hud {
      position: absolute;
      z-index: 660;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(11,11,13,0.92);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      backdrop-filter: blur(14px);
    }
    .map-hud button {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-dim);
      background: transparent;
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .map-hud button:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
    .map-hud button.primary {
      color: #fff;
      background: var(--red);
    }
    .map-hud button.primary:hover { background: var(--red-dark); }
    .map-hud .hud-divider {
      width: 1px;
      height: 20px;
      background: var(--line-strong);
    }

    .map-legend {
      position: absolute;
      z-index: 660;
      bottom: 24px;
      right: 16px;
      width: min(220px, calc(100vw - 32px));
      background: rgba(11,11,13,0.92);
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .map-legend[hidden] { display: none !important; }
    .map-legend-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 12px;
      color: var(--ink-dim);
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
    }
    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 2px;
      background: #9c5fc9;
      flex-shrink: 0;
    }

    .panel-badge {
      display: inline-flex;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
    }
    .panel-tagline {
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink-muted);
      margin-top: 6px;
    }

    .panel-sponsor {
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(207,16,45,0.05), transparent);
    }
    .sponsor-head {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 6px;
    }
    .sponsor-title {
      font-family: var(--display);
      font-size: 1.05rem;
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .sponsor-sub {
      font-size: 11px;
      line-height: 1.45;
      color: var(--ink-muted);
      margin-bottom: 12px;
    }
    .sponsor-slots { display: flex; flex-direction: column; gap: 8px; }
    .sponsor-slot {
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
    }
    .sponsor-slot--hero {
      border-style: solid;
      border-color: rgba(207,16,45,0.35);
      background: linear-gradient(135deg, rgba(207,16,45,0.12), rgba(255,255,255,0.02));
    }
    .sponsor-slot-tier {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .sponsor-slot-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-dim);
      margin-bottom: 3px;
    }
    .sponsor-slot-tag { font-size: 11px; color: var(--ink-muted); line-height: 1.35; }
    .sponsor-inquire {
      display: inline-flex;
      margin-top: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: var(--red);
      border-radius: 8px;
      padding: 9px 12px;
      text-decoration: none;
    }
    .sponsor-inquire:hover { background: var(--red-dark); }

    .panel-site-nav {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
    }
    .site-nav-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }
    .site-nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .site-nav-link {
      display: block;
      padding: 10px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.02);
      transition: border-color .15s, background .15s;
    }
    .site-nav-link:hover {
      border-color: rgba(207,16,45,0.35);
      background: rgba(207,16,45,0.08);
    }
    .site-nav-link strong {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-dim);
    }
    .site-nav-link small {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      color: var(--ink-muted);
    }

    .topbar-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-muted);
      min-width: 0;
    }
    .topbar-breadcrumb a {
      color: var(--ink-dim);
      text-decoration: none;
    }
    .topbar-breadcrumb a:hover { color: var(--red); }
    .topbar-breadcrumb span[aria-hidden] { opacity: 0.45; }

    .leaflet-interactive.tx-glow {
      filter: drop-shadow(0 0 6px rgba(156,95,201,0.65));
      animation: tx-pulse 3s ease-in-out infinite;
    }
    .leaflet-interactive.tx-grid-glow {
      filter: drop-shadow(0 0 4px rgba(124,58,237,0.45));
    }

    .water-pin svg { display: block; filter: drop-shadow(0 2px 6px rgba(14,165,233,0.45)); }

    .pane-footnote {
      font-size: 10px;
      color: var(--ink-muted);
      line-height: 1.4;
      padding: 8px 14px 12px;
    }
    @keyframes tx-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(156,95,201,0.45)); }
      50% { filter: drop-shadow(0 0 12px rgba(192,132,252,0.85)); }
    }

    .map-diff-badge {
      position: absolute;
      z-index: 660;
      top: 74px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: rgba(11,11,13,0.82);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      backdrop-filter: blur(10px);
    }
    .map-diff-badge em {
      font-style: normal;
      color: var(--red);
    }

    .map-topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 700;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: rgba(11,11,13,0.92);
      border-bottom: 1px solid var(--line-strong);
      backdrop-filter: blur(14px) saturate(140%);
    }
    .map-topbar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }
    .map-topbar-brand img { height: 34px; width: auto; flex-shrink: 0; }
    .map-topbar-kicker {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      white-space: nowrap;
    }
    .map-topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .map-topbar-actions a,
    .map-topbar-actions button {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 6px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .nav-link {
      color: var(--ink-dim);
      padding: 7px 10px;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
    .nav-cta {
      color: #fff;
      background: var(--red);
      border: 1px solid var(--red);
      padding: 7px 12px;
    }
    .nav-cta:hover { background: var(--red-dark); border-color: var(--red-dark); }

    .tile-toggle {
      display: flex;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
    }
    .tile-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: transparent;
      border: 0;
      border-right: 1px solid var(--line);
      padding: 7px 10px;
      cursor: pointer;
    }
    .tile-btn:last-child { border-right: 0; }
    .tile-btn:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
    .tile-btn.active { color: #fff; background: rgba(207,16,45,0.22); }

    .map-panel {
      position: absolute;
      z-index: 650;
      top: 74px;
      left: 16px;
      width: min(340px, calc(100vw - 32px));
      max-height: calc(100vh - 90px);
      display: flex;
      flex-direction: column;
      background: rgba(11,11,13,0.94);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(160%);
      overflow: hidden;
    }

    .panel-head {
      flex-shrink: 0;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panel-title {
      font-family: var(--display);
      font-size: 1.2rem;
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .panel-count-pill {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
    }
    .panel-tagline,
    .panel-badge,
    .panel-eyebrow,
    .panel-meta { display: none; }

    .panel-search-wrap {
      position: relative;
    }
    #map-search {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--ink);
      font: 500 13px/1.2 var(--sans);
      outline: none;
    }
    #map-search::placeholder { color: var(--ink-muted); }
    #map-search:focus {
      border-color: rgba(207,16,45,0.45);
      background: rgba(255,255,255,0.06);
    }
    .panel-tabs {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,0.15);
    }
    .panel-tab {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: transparent;
      border: 0;
      border-radius: 8px;
      padding: 8px 4px;
      cursor: pointer;
    }
    .panel-tab:hover { color: var(--ink-dim); background: rgba(255,255,255,0.04); }
    .panel-tab.active {
      color: var(--ink);
      background: rgba(207,16,45,0.14);
      box-shadow: inset 0 0 0 1px rgba(207,16,45,0.28);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .panel-body::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .panel-pane { padding-bottom: 8px; }
    .panel-pane[hidden] { display: none !important; }

    .pane-group { padding: 6px 10px 2px; }
    .pane-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: 8px 4px 6px;
    }

    .search-results {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      background: rgba(11,11,13,0.98);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.55);
      z-index: 20;
      overflow: hidden;
    }
    .search-results button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink-dim);
      text-align: left;
      cursor: pointer;
    }
    .search-results button:hover { background: rgba(255,255,255,0.04); color: var(--ink); }
    .search-results strong { display: block; font-size: 13px; font-weight: 600; }
    .search-results small { display: block; margin-top: 2px; font-size: 11px; color: var(--ink-muted); }

    .panel-section {
      padding: 10px 12px 12px;
      border-bottom: 1px solid var(--line);
    }
    .panel-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .panel-section-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    #show-all {
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      background: transparent;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
    }
    #show-all:hover { background: var(--red); color: #fff; border-color: var(--red); }

    .region-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .region-chip {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .region-chip:hover { color: var(--ink); }
    .region-chip.active {
      color: #fff;
      background: rgba(207,16,45,0.18);
      border-color: rgba(207,16,45,0.45);
    }

    .map-filters {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .map-filters label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-dim);
      cursor: pointer;
    }
    .map-filters label:hover { background: rgba(255,255,255,0.04); }
    .map-filters label.off { opacity: 0.45; }
    .map-filters input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
    .filter-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12);
    }
    .filter-name { flex: 1; min-width: 0; }
    .filter-count {

    #selected-record {

    .selected-kicker {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .selected-status {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .selected-name {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .selected-meta,
    .selected-detail {

      color: var(--ink-muted);

    }
    .selected-detail span {
      display: inline-block;
      min-width: 72px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .selected-link {
      display: inline-flex;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
      text-decoration: none;
    }
    .selected-link:hover { text-decoration: underline; }

    .map-directory {
      overflow: visible;
    }
    .map-directory button {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2px 10px;
      width: 100%;
      padding: 11px 16px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink-dim);
      text-align: left;
      cursor: pointer;
    }
    .map-directory button:hover,
    .map-directory button.active {
      background: rgba(255,255,255,0.04);
      color: var(--ink);
    }
    .map-directory button.active {
      box-shadow: inset 3px 0 0 var(--red);
    }
    .dir-dot {
      grid-row: span 2;
      width: 9px;
      height: 9px;
      margin-top: 4px;
      border-radius: 50%;
      align-self: start;
    }
    .map-directory strong { font-size: 13px; font-weight: 600; }
    .map-directory small { font-size: 11px; color: var(--ink-muted); }
    .dir-empty { padding: 12px 16px; font-size: 12px; color: var(--ink-muted); }

    .map-layers {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s, opacity .15s;
    }
    .layer-row:hover { background: rgba(255,255,255,0.04); border-color: var(--line); }
    .layer-row.off { opacity: 0.42; }
    .layer-row input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
    .layer-swatch {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
    }
    .layer-name {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .layer-count {
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-muted);
      font-variant-numeric: tabular-nums;
    }
    .layer-switch {
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      position: relative;
      flex-shrink: 0;
      transition: background .2s;
    }
    .layer-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      transition: transform .2s ease;
    }
    .layer-row:has(input:checked) .layer-switch { background: var(--red); }
    .layer-row:has(input:checked) .layer-switch::after { transform: translateX(16px); }
    .layer-row:has(input:checked) .layer-name { color: var(--ink); }

    .map-stories {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .story-card {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--ink-dim);
      cursor: pointer;
    }
    .story-card:hover,
    .story-card.active {
      border-color: rgba(207,16,45,0.4);
      background: rgba(207,16,45,0.1);
      color: var(--ink);
    }
    .story-kicker {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 4px;
    }
    .story-card strong { display: block; font-size: 12px; line-height: 1.3; font-weight: 600; }
    .story-card small { display: none; }

    #story-detail {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(156,95,201,0.1), transparent);
    }
    #story-detail[hidden] { display: none !important; }
    #story-detail h3 { font-size: 15px; line-height: 1.25; margin: 4px 0 8px; }
    #story-detail p { font-size: 12px; line-height: 1.5; color: var(--ink-dim); }
    .story-detail-kicker {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .story-detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .story-detail-actions a,
    .story-detail-actions button {
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      background: transparent;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 6px 10px;
      text-decoration: none;
      cursor: pointer;
    }
    .story-detail-actions a:hover,
    .story-detail-actions button:hover { background: rgba(207,16,45,0.12); }

    .cd-label-wrap,
    .line-label-wrap { pointer-events: none; }
    .cd-label {
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e0e7ff;
      background: rgba(11,11,13,0.78);
      border: 1px solid rgba(129,140,248,0.5);
      border-radius: 6px;
      padding: 3px 7px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .leaflet-tooltip.boundary-tip {
      background: rgba(11,11,13,0.92);
      border: 1px solid var(--line-strong);
      color: var(--ink-dim);
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .layer-swatch--line {
      width: 22px;
      height: 0;
      border-radius: 0;
      border-top: 3px solid currentColor;
      box-shadow: none;
      align-self: center;
    }

    .line-label-wrap { pointer-events: none; }
    .line-label {
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e9d5ff;
      background: rgba(11,11,13,0.82);
      border: 1px solid rgba(156,95,201,0.45);
      border-radius: 999px;
      padding: 4px 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .panel-foot {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
    }
    .panel-foot button {
      flex: 1;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-dim);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .panel-foot button:hover { color: var(--ink); background: rgba(255,255,255,0.06); }
    .panel-ext-link {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-dim);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 8px 10px;
      text-decoration: none;
    }
    .panel-ext-link:hover { color: var(--ink); background: rgba(255,255,255,0.06); }

    .leaflet-control-zoom {
      border: 1px solid var(--line-strong) !important;
      border-radius: 10px !important;
      overflow: hidden;
      background: var(--panel) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35) !important;
      backdrop-filter: blur(10px);
    }
    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      background: transparent !important;
      color: var(--ink) !important;
      border-bottom: 1px solid var(--line) !important;
      font-size: 18px !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom: 0 !important; }
    .leaflet-control-zoom a:hover {
      background: rgba(207,16,45,0.12) !important;
      color: var(--red) !important;
    }
    .leaflet-bottom.leaflet-right { right: 16px !important; bottom: 18px !important; }

    .map-pin svg { display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35)); }
    .map-pin--active svg { filter: drop-shadow(0 0 10px rgba(207,16,45,0.55)); transform: scale(1.08); }
    .cluster-bubble {
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(207,16,45,0.88);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .leaflet-popup-content-wrapper {
      background: rgba(11,11,13,0.96);
      color: var(--ink);
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      box-shadow: 0 20px 50px rgba(0,0,0,0.55);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-tip { background: rgba(11,11,13,0.96); box-shadow: none; }
    .leaflet-popup-content { margin: 0; width: 300px !important; }
    .leaflet-popup-close-button {
      color: var(--ink-muted) !important;
      font-size: 20px !important;
      padding: 8px !important;
    }
    .pop-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, color-mix(in srgb, var(--status, var(--red)) 14%, transparent), transparent);
    }
    .pop-header::before {
      content: "";
      display: block;
      height: 3px;
      margin: -14px -16px 12px;
      background: var(--status, var(--red));
    }
    .pop-status {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--status, var(--red));
      margin-bottom: 6px;
    }
    .pop-name { font-size: 17px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
    .pop-location { font-size: 12px; color: var(--ink-muted); }
    .pop-body { padding: 12px 16px; display: grid; gap: 8px; }
    .pop-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px;
      font-size: 12px;
    }
    .pop-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .pop-val { color: var(--ink-dim); }
    .pop-note {
      font-size: 12px;
      line-height: 1.5;
      color: var(--ink-muted);
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }
    .pop-footer { padding: 0 16px 14px; }
    .pop-source {
      display: inline-flex;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
    }
    .pop-source:hover { text-decoration: underline; }

    .sidebar-toggle { display: none; }

    @media (max-width: 1100px) {
      .map-stats-ribbon { display: none; }
      .map-diff-badge { display: none; }
    }
    @media (max-width: 900px) {
      .map-topbar-kicker { display: none; }
      .tile-toggle { display: none; }
      .topbar-breadcrumb { display: none; }
      .map-legend { bottom: 88px; right: 12px; }
    }

    @media (max-width: 768px) {
      .map-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-height: 52px;
        border-radius: 16px 16px 0 0;
        transition: max-height .28s ease;
      }
      .map-panel.open { max-height: min(85vh, 720px); }
      .panel-head { cursor: pointer; }
      .panel-tabs,
      .panel-body,
      #selected-record,
      #story-detail { display: none; }
      .map-panel.open .panel-tabs,
      .map-panel.open .panel-body,
      .map-panel.open #selected-record,
      .map-panel.open #story-detail { display: block; }
      .map-panel.open .panel-body { display: block; overflow-y: auto; }
      .sidebar-toggle {
        display: block;
        position: absolute;
        z-index: 680;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#map">Skip to map</a>

  <div class="map-shell">
    <header class="map-topbar">
      <a class="map-topbar-brand" href="index.html">
        <img src="brand-logo-light.png" alt="Michigan Data Center Tracker">
        <span class="map-topbar-kicker">Live intelligence map</span>
      </a>
      <nav class="topbar-breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Tracker</a>
        <span aria-hidden="true">/</span>
        <span>Map</span>
      </nav>
      <div class="map-topbar-actions">
        <div class="tile-toggle" role="group" aria-label="Map style">
          <button class="tile-btn active" data-mode="dark" type="button">Dark</button>
          <button class="tile-btn" data-mode="day" type="button">Daylight</button>
          <button class="tile-btn" data-mode="sat" type="button">Satellite</button>
        </div>
        <a class="nav-link" href="index.html">← Back to tracker</a>
        <a class="nav-link" href="methodology.html">Methodology</a>
        <a class="nav-cta" href="index.html#briefing">Subscribe</a>
      </div>
    </header>

    <aside class="map-panel" id="map-sidebar" aria-label="Map controls">
      <div class="panel-head" id="sidebar-header">
        <div class="panel-head-top">
          <h1 class="panel-title">Intelligence map</h1>
          <span class="panel-count-pill" id="panel-record-count">Loading…</span>
        </div>
        <p class="panel-tagline" id="panel-tagline" hidden></p>
        <div class="panel-badge" id="panel-badge" hidden></div>
        <div class="panel-search-wrap">
          <input type="search" id="map-search" placeholder="Search records…" autocomplete="off" spellcheck="false" aria-label="Search records">
          <div id="search-results" class="search-results" hidden></div>
        </div>
        <span id="map-updated" hidden></span>
      </div>

      <div id="selected-record" hidden></div>
      <div id="story-detail" hidden></div>

      <nav class="panel-tabs" role="tablist" aria-label="Panel sections">
        <button class="panel-tab active" type="button" role="tab" aria-selected="true" data-tab="layers" id="tab-btn-layers">Layers</button>
        <button class="panel-tab" type="button" role="tab" aria-selected="false" data-tab="filter" id="tab-btn-filter">Filter</button>
        <button class="panel-tab" type="button" role="tab" aria-selected="false" data-tab="list" id="tab-btn-list">List</button>
        <button class="panel-tab" type="button" role="tab" aria-selected="false" data-tab="more" id="tab-btn-more">More</button>
      </nav>

      <div class="panel-body">
        <div class="panel-pane" id="pane-layers" role="tabpanel" aria-labelledby="tab-btn-layers">
          <div class="pane-group">
            <div class="pane-label">Records</div>
            <div class="map-layers" id="map-layers"></div>
          </div>
          <div class="pane-group">
            <div class="pane-label">Grid &amp; water</div>
            <div class="map-layers" id="map-overlays"></div>
          </div>
          <div class="pane-group">
            <div class="pane-label">Boundaries</div>
            <div class="map-layers" id="map-boundaries"></div>
          </div>
        </div>

        <div class="panel-pane" id="pane-filter" role="tabpanel" aria-labelledby="tab-btn-filter" hidden>
          <div class="panel-section">
            <div class="panel-section-head">
              <span class="panel-section-title">Region</span>
            </div>
            <div class="region-chips">
              <button class="region-chip active" data-region="all" type="button">All</button>
              <button class="region-chip" data-region="metro_detroit" type="button">Metro</button>
              <button class="region-chip" data-region="west_michigan" type="button">West</button>
              <button class="region-chip" data-region="mid_michigan" type="button">Mid</button>
              <button class="region-chip" data-region="northern_michigan" type="button">North</button>
            </div>
          </div>
          <div class="panel-section">
            <div class="panel-section-head">
              <span class="panel-section-title">Status</span>
              <button type="button" id="show-all">Reset</button>
            </div>
            <div class="map-filters" id="map-filters"></div>
          </div>
        </div>

        <div class="panel-pane" id="pane-list" role="tabpanel" aria-labelledby="tab-btn-list" hidden>
          <div class="map-directory" id="map-directory"></div>
        </div>

        <div class="panel-pane" id="pane-more" role="tabpanel" aria-labelledby="tab-btn-more" hidden>
          <div class="panel-section">
            <div class="panel-section-head">
              <span class="panel-section-title">Stories</span>
            </div>
            <div class="map-stories" id="map-stories"></div>
          </div>
          <div class="panel-sponsor" id="map-sponsors" aria-label="Sponsorship"></div>
          <div class="panel-site-nav" aria-label="Site navigation">
            <div class="site-nav-title">Tracker</div>
            <div class="site-nav-grid" id="site-nav-grid"></div>
          </div>
          <div class="panel-foot">
            <button id="copy-link" type="button">Copy link</button>
            <a id="external-map-link" class="panel-ext-link" href="https://www.mifuturegrid.com/oneida-sabine-lake/" target="_blank" rel="noopener" hidden>ITC map ↗</a>
          </div>
        </div>
      </div>
    </aside>

    <button class="sidebar-toggle" id="sidebar-toggle" aria-controls="map-sidebar" aria-expanded="false" type="button">Open panel</button>

    <div class="map-diff-badge" aria-hidden="true">Only statewide map with <em>DCs + transmission + aquifers + political lines</em> in one view</div>

    <div class="map-stats-ribbon" id="map-stats-ribbon" aria-label="Map statistics"></div>

    <div class="map-hud" role="toolbar" aria-label="Map controls">
      <button class="primary" id="map-reset" type="button" title="Reset filters and zoom (R)">Reset map</button>
      <span class="hud-divider" aria-hidden="true"></span>
      <button id="map-locate" type="button" title="Find records near you">Near me</button>
      <button id="map-share" type="button" title="Share this view">Share</button>
      <button id="map-legend-toggle" type="button" aria-expanded="false" aria-controls="map-legend">Legend</button>
    </div>

    <div class="map-legend" id="map-legend" hidden></div>

    <div class="map-grain" aria-hidden="true"></div>
    <div class="map-vignette" aria-hidden="true"></div>
    <main id="map" aria-label="Interactive map of Michigan data center records"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="map.js?v=20260629j" defer></script>
