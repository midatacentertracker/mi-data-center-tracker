  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f 55%);display:flex;gap:44px;padding:44px 40px;\">\n      <div style=\"flex:1 1 54%;min-width:0;display:flex;flex-direction:column;justify-content:center;\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#E03131;margin-bottom:16px;\">Partnership</span>\n        <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:37px;line-height:1;color:#f6f3f0;margin:0 0 16px;\">THE PEOPLE DECIDING MICHIGAN'S DATA CENTER FUTURE READ THIS EVERY WEEK.</h3>\n        <p style=\"max-width:460px;margin:0 0 22px;color:#a39e99;font-size:16px;line-height:1.6;\">Township boards, state regulators, reporters, and energy executives rely on it. Your support keeps it independent and rigorous.</p>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:26px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:19px;height:19px;border-radius:50%;background:rgba(224,49,49,.16);color:#E03131;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;\">\u2713</span><span style=\"font-size:14px;color:#cbc7c3;\">Logo on every page and facility profile</span></div>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:19px;height:19px;border-radius:50%;background:rgba(224,49,49,.16);color:#E03131;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;\">\u2713</span><span style=\"font-size:14px;color:#cbc7c3;\">Named in the daily briefing \u2014 11,000+ subscribers</span></div>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:19px;height:19px;border-radius:50%;background:rgba(224,49,49,.16);color:#E03131;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;\">\u2713</span><span style=\"font-size:14px;color:#cbc7c3;\">Featured in the quarterly impact report</span></div>\n        </div -size:14px;\">Contact</a>\n          </div>\n          <div style=\"display:flex;flex-direction:column;gap:11px;\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5f5b57;margin-bottom:3px;\">Connect</span>\n            <a class=\"flink\" href=\"stories.html\" style=\"font-size:14px;\">Newsletter</a>\n            <a class=\"flink\" href=\"index.html\" style=\"font-size:14px;\">RSS</a>\n            <a class=\"flink\" href=\"index.html\" style=\"font-size:14px;\">Bluesky</a>\n            <a class=\"flink\" href=\"index.html\" style=\"font-size:14px;\">Send a tip</a>\n          </div>\n        </div>\n      </div>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:34px;padding-top:20px;border-top:1px solid #1a1813;\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#7d7975;\">Independent \u00b7 Nonpartisan</span>\n        <span style=\"font-size:12px;color:#5f5b57;\">\u00a9 2026 Michigan Data Center Tracker \u00b7 Built in Michigan</span>\n      </div>\n    </footer>\n\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, hero: false, hearings: false, partner: false, podPlaying: false, podMuted: true, cmsWire: null, cmsDeck: null, flyOpen: false, flyDone: false };\n\n  // CMS endpoints \u2014 set window.MDCT_CMS = 'http://127.0.0.1:8787' (your Grok Build desk) to go live.\n  // Falls back to the built-in editorial feed if unreachable (e.g. in preview).\n  cmsBase() { return (typeof window !== 'undefined' && window.MDCT_CMS) || 'http://127.0.0.1:8787'; }\n\n  componentDidMount() {\n    this._wait = setInterval(() => {\n      if (window.L) { clearInterval(this._wait); this.initMaps(); }\n    }, 60);\n    this.loadCMS();\n    try {\n      if (!localStorage.getItem('mdct_flyin_seen')) {\n        this._flyTimer = setTimeout(() => { if (!this._dead) this.setState({ flyOpen: true }); }, 10000);\n      }\n    } catch (e) {}\n  }\n  componentWillUnmount() { clearInterval(this._wait); clearTimeout(this._flyTimer); this._dead = true; }\n\n  loadCMS() {\n    const base = this.cmsBase();\n    const grab = (path) => fetch(base + path, { headers: { 'Accept': 'application/json' } })\n      .then(r => r.ok ? r.json() : Promise.reject(r.status));\n    // Stories / Wire feed\n    grab('/api/stories').then(d => {\n      if (this._dead) return;\n      const rows = Array.isArray(d) ? d : (d.stories || d.items || d.data || []);\n      const wire = rows.map((s, i) => ({\n        iso: s.iso || s.published_at || s.date || s.created_at,\n        title: s.title || s.headline || s.name,\n        source: s.source || s.byline || s.publication || '',\n        cat: s.cat || s.county || s.region || s.tag || 'STATEWIDE',\n        breaking: !!(s.breaking || s.is_breaking),\n        lead: i === 0 || !!s.lead || !!s.is_lead,\n      })).filter(w => w.title && w.iso);\n      if (wire.length) this.setState({ cmsWire: wire });\n    }).catch(() => {});\n    // On Deck / hearings feed\n    grab('/api/on-deck').catch(() => grab('/api/meetings')).then(d => {\n      if (this._dead || !d) return;\n      const rows = Array.isArray(d) ? d : (d.meetings || d.items || d.data || []);\n      const deck = rows.map(m => ({\n        iso: (m.iso || m.date || m.starts_at || '').slice(0, 10),\n        body: m.body || m.org || m.title || m.name,\n        topic: m.topic || m.summary || m.description || '',\n        region: m.region || m.area || '',\n        time: m.time || m.start_time || '',\n        status: m.status || m.type || 'Meeting',\n        urgent: !!(m.urgent || /vote/i.test(m.status || '')),\n      })).filter(m => m.body && m.iso);\n      if (deck.length) this.setState({ cmsDeck: deck.slice(0, 6) });\n    }).catch(() => {});\n  }\n\n  initMaps() {\n    const STATUS = {\n      Operat ;color:#16140f;\">' + s[4] + ' MW</span></span><span><span style=\"display:block;font-family:\\'Space Mono\\',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#999;\">Status</span><span style=\"font-weight:700;font-size:13px;color:' + STATUS[s[5]] + ';\">' + s[5] + '</span></span></div></div>';\n    const tileUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png';\n    const tileOpt = { subdomains: 'abcd', maxZoom: 19, attribution: '\u00a9 OpenStreetMap \u00b7 \u00a9 CARTO' };\n\n    const build = (id, opts, zoom) => {\n      const el = document.getElementById(id);\n      if (!el || el._leaflet_id) return null;\n      const map = L.map(el, Object.assign({ zoomControl: false, scrollWheelZoom: false, attributionControl: false }, opts)).setView([43.7, -84.55], zoom);\n      L.tileLayer(tileUrl, tileOpt).addTo(map);\n      SITES.forEach(s => {\n        const sz = s[4] >= 400 ? 15 : s[4] >= 200 ? 12 : 10;\n        L.marker([s[2], s[3]], { icon: dot(STATUS[s[5]], sz) }).addTo(map).bindPopup(popup(s));\n      });\n      setTimeout(() => map.invalidateSize(), 200);\n      return map;\n    };\n\n    this._mapD = build('hero-map-d', { dragging: false, doubleClickZoom: false, touchZoom: false, keyboard: false }, 6.5);\n    this._mapM = build('hero-map-m', { dragging: false, doubleClickZoom: false, touchZoom: false, keyboard: false }, 6.1);\n  }\n\n  renderVals() {\n    const go = (key) => () => this.setState({ [key]: true });\n    const NOW = new Date('2026-06-30T12:00:00');\n\n    // ---- CMS feed: wire stories (newest first) ----\n    const CAT = {\n      Grid: '#E03131', Local: '#7fb0e0', Policy: '#c9a24b', Water: '#5bb3a6', Community: '#b07fd0', Development: '#dd8048',\n    };\n    const rawWire = this.state.cmsWire || [\n      { iso: '2026-06-30T09:40', title: 'DTE files for 1,383 MW special-rate contract \u2014 largest in state history', source: 'MPSC docket', cat: 'STATEWIDE', breaking: true, lead: true },\n      { iso: '2026-06-30T06:10', title: 'Mundy Township sets July 14 rezoning vote on 600 MW campus', source: 'MLive', cat: 'Genesee Co.' },\n      { iso: '2026-06-29T16:30', title: 'Saline Township extends data center moratorium six months', source: 'Bridge Michigan', cat: 'Washtenaw Co.' },\n      { iso: '2026-06-28T11:00', title: 'Holland water-withdrawal deal draws EGLE scrutiny', source: \"Crain's Detroit\", cat: 'Ottawa Co.' },\n      { iso: '2026-06-26T14:20', title: \"Howell's $1B Meta-backed proposal withdrawn after packed hearing\", source: 'Detroit Free Press', cat: 'Livingston Co.' },\n      { iso: '2026-06-24T10:00', title: 'Nine Michigan townships now hold active data center moratoria', source: 'Tracker analysis', cat: 'STATEWIDE' },\n    ];\n    const ago = (iso) => {\n      const h = Math.round((NOW - new Date(iso)) / 36e5);\n      if (h < 1) return 'just now';\n      if (h < 24) return h + 'h ago';\n      const d = Math.round(h / 24);\n      return d === 1 ? 'Yesterday' : d + 'd ago';\n    };\n    const mon = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n    const wire = rawWire.map((w, i) => {\n      const d = new Date(w.iso);\n      const hrs = (NOW - d) / 36e5;\n      return Object.assign({}, w, {\n        timeAgo: ago(w.iso),\n        dateLabel: mon[d.getMonth()] + ' ' + String(d.getDate()).padStart(2, '0'),\n        isNew: hrs < 36,\n        catColor: '#9b9794',\n        timeColor: hrs < 36 ? '#E03131' : '#7d7975',\n        rowAccent: hrs < 36 ? '#E03131' : 'transparent',\n      });\n    });\n    const lead = wire.find(w => w.lead) || wire[0];\n    const wireList = wire.filter(w => w !== lead);\n    const tickerItems = wire.slice(0, 6);\n\n    // ---- CMS feed: upcoming hearings (On Deck) ----\n    const rawDeck = this.state.cmsDeck || [\n      { iso: '2026-07-08', body: 'Saline Township Planning Commission', topic: '250-acre data center proposal', region: 'SE Michigan', time: '7:00 PM', status: 'Public hearing', urgent: false },\n      { iso: '2026-07-10', body: 'MI Public Service Commission', topic: 'DTE large-load rate case', region: 'Mid-Michigan', time: '9:00 AM', status: 'Testimony', urgent: false },\n      { iso: '2026-07-14', body: 'Mundy Township Board', topic: '600 MW hyperscale campus rezoning', region: 'Mid-Michigan', time: '6:30 PM', status: 'Vote expected', urgent: true },\n      { iso: '2026-07-16', body: 'City of Holland', topic: 'Water-withdrawal agreement', region: 'West MI', time: '6:00 PM', status: 'Public comment', urgent: false },\n    ];\n    const until = (iso) => {\n      const days = Math.round((new Date(iso + 'T00:00:00') - NOW) / 864e5);\n      if (days <= 0) return 'Today';\n      if (days === 1) return 'Tomorrow';\n      if (days < 7) return 'in ' + days + ' days';\n      return 'in ' + Math.round(days / 7) + ' wk';\n    };\n    const onDeck = rawDeck.map(m => {\n      const d = new Date(m.iso + 'T00:00:00');\n      return Object.assign({}, m, {\n        mon: mon[d.getMonth()], day: String(d.getDate()).padStart(2, '0'),\n        countdown: until(m.iso),\n        topColor: m.urgent ? '#E03131' : '#2b2824',\n        cdColor: m.urgent ? '#E03131' : '#7d7975',\n        statusColor: m.urgent ? '#E03131' : '#9b9794',\n        statusBorder: m.urgent ? '#E03131' : '#322e29',\n      });\n    });\n\n    return {\n      menuOpen: this.state.menuOpen,\n      podCls: this.state.podPlaying ? 'playing' : '',\n      podIcon: this.state.podPlaying ? '\u275a\u275a' : '\u25b6',\n      togglePod: () => { const next = !this.state.podPlaying; this.setState({ podPlaying: next }); try { const a = document.getElementById('pod-audio'); if (a) { if (next) { a.muted = false; a.play && a.play().catch(()=>{}); } else { a.pause && a.pause(); } } } catch(e){} },\n      podDate: mon[NOW.getMonth()].charAt(0)+mon[NOW.getMonth()].slice(1).toLowerCase() + ' ' + NOW.getDate(),\n      podDur: '12 min',\n      podTeaser: 'Fireworks at the Mason hearing \u2014 and the 1,383 MW ask that could move your bill.',\n      podMuteLabel: this.state.podMuted ? 'Listen' : 'Mute',\n      toggleMute: () => { const next = !this.state.podMuted; this.setState({ podMuted: next, podPlaying: true }); try { const a = document.getElementById('pod-audio'); if (a) { a.muted = next; if (!next) { a.play && a.play().catch(()=>{}); } } } catch(e){} },\n      bars: Array.from({length: 40}, (_, i) => ({ h: (22 + Math.round(Math.abs(Math.sin(i*1.7)*Math.cos(i*0.6))*78)) + '%', delay: (i % 9 * 0.08).toFixed(2) + 's' })),\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      heroPending: !this.state.hero, heroSubscribed: this.state.hero, subscribeHero: go('hero'),\n      hearingsPending: !this.state.hearings, hearingsSubscribed: this.state.hearings, subscribeHearings: go('hearings'),\n      partnerPending: !this.state.partner, partnerSubscribed: this.state.partner, subscribePartner: go('partner'),\n      lead, wireList, tickerItems, onDeck,\n      wireUpdated: ago(rawWire[0].iso),\n      flyOpen: this.state.flyOpen, flyPending: !this.state.flyDone, flyDone: this.state.flyDone,\n      stopProp: (e) => { e.stopPropagation(); },\n      dismissFly: () => { try { localStorage.setItem('mdct_flyin_seen', '1'); } catch (e) {} this.setState({ flyOpen: false }); },\n      submitFly: () => { try { localStorage.setItem('mdct_flyin_seen', '1'); } catch (e) {} this.setState({ flyDone: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n</body></html>"
